<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DigiLib FST - Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        primary: '#1d4ed8',
                        secondary: '#3b82f6',
                        accent: '#f59e0b',
                    }
                }
            }
        }
    </script>
    <style>
        @keyframes slideInUp {
            from { transform: translateY(100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        @keyframes fadeOut {
            from { opacity: 1; }
            to { opacity: 0; }
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        .spinner { animation: spin 1s linear infinite; }
        .toast-enter { animation: slideInUp 0.3s ease-out forwards; }
        .toast-exit { animation: fadeOut 0.3s ease-out forwards; }
        
        .role-card {
            transition: all 0.3s ease;
            cursor: pointer;
            border: 3px solid transparent;
        }
        .role-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 12px 24px -8px rgba(0,0,0,0.15);
        }
        .role-card.selected {
            border-color: #1d4ed8;
            background-color: #eff6ff;
            box-shadow: 0 4px 16px rgba(29, 78, 216, 0.2);
        }
        .role-card.selected .icon-wrapper {
            background-color: #1d4ed8;
            color: white;
            transform: scale(1.05);
        }
        .role-card .icon-wrapper {
            transition: all 0.3s ease;
        }
        .role-card .role-emoji {
            font-size: 28px;
            line-height: 1;
        }
    </style>
</head>
<body class="bg-gradient-to-br from-blue-50 via-white to-slate-100 min-h-screen flex items-center justify-center p-4">

    <!-- ============ TOAST CONTAINER ============ -->
    <div id="toast-container" class="fixed bottom-6 right-6 z-[90] flex flex-col gap-2 pointer-events-none"></div>

    <!-- ============ LOGIN CARD ============ -->
    <div class="w-full max-w-md">
        <div class="bg-white rounded-2xl shadow-2xl p-8 transform transition-all duration-500">
            
            <!-- Logo -->
            <div class="text-center mb-8">
                <div class="w-20 h-20 bg-blue-100 text-primary rounded-2xl flex items-center justify-center mx-auto mb-4 text-4xl shadow-sm">
                    <i class="fa-solid fa-book-bookmark"></i>
                </div>
                <h1 class="text-3xl font-bold text-slate-800">DigiLib FST</h1>
                <p class="text-sm text-slate-500 mt-1">Sistem Informasi Perpustakaan Digital</p>
                <div class="mt-3 inline-block px-3 py-1 bg-blue-50 text-primary text-xs font-semibold rounded-full">
                    <i class="fa-regular fa-building mr-1"></i> Fakultas Sains & Teknologi
                </div>
            </div>

            <!-- Role Selection -->
            <div class="mb-6">
                <label class="block text-sm font-semibold text-slate-700 mb-3 text-center">Pilih Role Anda</label>
                <div class="grid grid-cols-3 gap-3">
                    <!-- Mahasiswa -->
                    <div onclick="selectRole('mahasiswa')" id="role-mahasiswa" class="role-card selected rounded-xl p-4 text-center">
                        <div class="icon-wrapper w-14 h-14 rounded-full bg-blue-100 text-primary flex items-center justify-center mx-auto mb-2">
                            <span class="role-emoji">🎓</span>
                        </div>
                        <p class="text-xs font-bold text-slate-700">Mahasiswa</p>
                    </div>
                    
                    <!-- Dosen -->
                    <div onclick="selectRole('dosen')" id="role-dosen" class="role-card rounded-xl p-4 text-center">
                        <div class="icon-wrapper w-14 h-14 rounded-full bg-slate-100 text-slate-500 flex items-center justify-center mx-auto mb-2">
                            <span class="role-emoji">👨‍🏫</span>
                        </div>
                        <p class="text-xs font-bold text-slate-700">Dosen</p>
                    </div>
                    
                    <!-- Petugas -->
                    <div onclick="selectRole('petugas')" id="role-petugas" class="role-card rounded-xl p-4 text-center">
                        <div class="icon-wrapper w-14 h-14 rounded-full bg-slate-100 text-slate-500 flex items-center justify-center mx-auto mb-2">
                            <span class="role-emoji">📋</span>
                        </div>
                        <p class="text-xs font-bold text-slate-700">Petugas</p>
                    </div>
                </div>
            </div>

            <!-- Tombol Login -->
            <button id="btn-login" onclick="executeLogin()" class="w-full bg-primary text-white font-bold rounded-xl px-4 py-3.5 mt-2 hover:bg-blue-800 transition-all flex justify-center items-center gap-2 shadow-lg shadow-blue-500/25 hover:shadow-blue-500/40">
                <i class="fa-solid fa-right-to-bracket"></i> Masuk ke Dashboard
            </button>

            <!-- Info -->
            <div class="mt-4 text-center">
                <p class="text-[10px] text-slate-400">
                    <i class="fa-regular fa-circle-check mr-1 text-green-500"></i>
                    Pilih role, lalu masuk ke dashboard masing-masing
                </p>
            </div>

            <!-- Footer -->
            <div class="mt-6 pt-4 border-t border-slate-200 text-center">
                <p class="text-[10px] text-slate-400">
                    <i class="fa-regular fa-shield-check mr-1"></i> 
                    Sistem terintegrasi dengan SSO Universitas
                </p>
            </div>
        </div>
        
        <!-- Version -->
        <p class="text-center text-xs text-slate-400 mt-4">
            v2.0 • Prototype Perpustakaan Digital FST
        </p>
    </div>

    <script>
        // ============================================================
        // STATE
        // ============================================================
        let selectedRole = 'mahasiswa';

        // ============================================================
        // ROLE SELECTION
        // ============================================================
        function selectRole(role) {
            selectedRole = role;
            
            // Update UI
            document.querySelectorAll('.role-card').forEach(function(el) {
                el.classList.remove('selected');
            });
            document.getElementById('role-' + role).classList.add('selected');
        }

        // ============================================================
        // LOGIN
        // ============================================================
        function executeLogin() {
            var btn = document.getElementById('btn-login');
            
            // Show loading
            btn.innerHTML = '<i class="fa-solid fa-spinner spinner"></i> Mengarahkan...';
            btn.classList.add('opacity-80', 'cursor-not-allowed');

            // Simulate process
            setTimeout(function() {
                var targetPage = '';
                var displayName = '';
                
                if (selectedRole === 'mahasiswa') {
                    targetPage = 'mahasiswa.html';
                    displayName = 'Mahasiswa FST';
                } else if (selectedRole === 'dosen') {
                    targetPage = 'dosen.html';
                    displayName = 'Dosen FST';
                } else {
                    targetPage = 'admin.html';
                    displayName = 'Petugas Perpustakaan';
                }

                // Simpan role ke localStorage
                localStorage.setItem('selectedRole', selectedRole);

                // Show toast
                showToast('Mengarahkan ke dashboard ' + displayName, 'fa-arrow-right', 'bg-green-600');
                
                // Redirect
                setTimeout(function() {
                    window.location.href = targetPage;
                }, 600);

            }, 800);
        }

        // ============================================================
        // TOAST
        // ============================================================
        function showToast(message, iconClass, bgColorClass) {
            var container = document.getElementById('toast-container');
            var toast = document.createElement('div');
            toast.className = 'toast-enter flex items-center gap-3 px-4 py-3 rounded-lg shadow-lg text-white text-sm font-medium ' + bgColorClass + ' max-w-sm pointer-events-auto';
            toast.innerHTML = '<i class="fa-solid ' + iconClass + ' text-lg"></i> <p>' + message + '</p>';
            container.appendChild(toast);
            setTimeout(function() {
                toast.classList.replace('toast-enter', 'toast-exit');
                setTimeout(function() {
                    toast.remove();
                }, 300);
            }, 4000);
        }

        // ============================================================
        // KEYBOARD SHORTCUT (Enter to login)
        // ============================================================
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                executeLogin();
            }
        });
    </script>
</body>
</html>
